<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailFlow - Activate License</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #050508;
            color: #f0f0f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .title-bar {
            height: 32px;
            background: #0a0a12;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            -webkit-app-region: drag;
            flex-shrink: 0;
        }

        .title-bar-label {
            font-size: 12px;
            color: #9898b8;
            font-weight: 500;
        }

        .title-bar-controls {
            display: flex;
            gap: 2px;
            -webkit-app-region: no-drag;
        }

        .title-bar-controls button {
            width: 36px;
            height: 28px;
            border: none;
            background: transparent;
            color: #9898b8;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .title-bar-controls button:hover {
            background: rgba(255,255,255,0.1);
            color: #f0f0f8;
        }

        .title-bar-controls button.close:hover {
            background: #ef4444;
            color: white;
        }

        .activate-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .activate-card {
            background: #0f0f18;
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 16px;
            padding: 48px;
            width: 440px;
            text-align: center;
        }

        .app-logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .app-name {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .app-subtitle {
            color: #9898b8;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #9898b8;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #16162a;
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 8px;
            color: #f0f0f8;
            font-size: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            letter-spacing: 1px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #7c3aed;
        }

        .form-group input::placeholder {
            color: #4a4a6a;
            letter-spacing: normal;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .btn-activate {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-activate:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
        }

        .btn-activate:active {
            transform: translateY(0);
        }

        .btn-activate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="title-bar">
        <span class="title-bar-label">MailFlow</span>
        <div class="title-bar-controls">
            <button onclick="electronAPI?.minimize()">&#x2013;</button>
            <button onclick="electronAPI?.maximize()">&#x25A1;</button>
            <button class="close" onclick="electronAPI?.close()">&#x2715;</button>
        </div>
    </div>

    <div class="activate-container">
        <div class="activate-card">
            <div class="app-logo">&#9993;</div>
            <div class="app-name">MailFlow</div>
            <div class="app-subtitle">Enter your license key to get started</div>

            <form onsubmit="handleActivate(event)">
                <div class="form-group">
                    <label>License Key</label>
                    <input
                        type="text"
                        id="licenseKey"
                        placeholder="Enter your license key"
                        autocomplete="off"
                        spellcheck="false"
                        required
                    />
                </div>

                <button type="submit" class="btn-activate" id="activateBtn">
                    Activate License
                </button>

                <div class="error-msg" id="errorMsg"></div>
            </form>
        </div>
    </div>

    <script>
        // Use electronAPI if available (Electron), otherwise fall back
        const electronAPI = window.electronAPI || null;

        async function handleActivate(event) {
            event.preventDefault();

            const key = document.getElementById('licenseKey').value.trim();
            const btn = document.getElementById('activateBtn');
            const errorMsg = document.getElementById('errorMsg');

            if (!key) return;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Activating...';
            errorMsg.classList.remove('visible');

            try {
                const response = await fetch('/api/license/activate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Activation failed');
                }

                // Success - redirect to main app
                window.location.href = '/';
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Activate License';
            }
        }
    </script>
</body>
</html>
